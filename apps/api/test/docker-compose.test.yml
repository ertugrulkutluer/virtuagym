services:
  postgres-test:
    image: postgres:16-alpine
    container_name: gymflow-postgres-test
    environment:
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: gymflow_test
      POSTGRES_DB: gymflow_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis-test:
    image: redis:7-alpine
    container_name: gymflow-redis-test
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
