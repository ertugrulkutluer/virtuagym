services:
  postgres:
    image: postgres:16-alpine
    container_name: gymflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-gymflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gymflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gymflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - gymflow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gymflow_pgdata:
  gymflow_redisdata:
